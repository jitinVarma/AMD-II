# Render Blueprint for DeepSync -- one web service serves both the static
# front-end and the job API from the same FastAPI process (see
# backend/main.py). Deploy: connect this repo in the Render dashboard ->
# "New from Blueprint" -> Render finds this file automatically. Or
# `render blueprint launch` with the Render CLI. See README.md "Deploy to
# Render".
services:
  - type: web
    name: deepsync
    runtime: docker
    dockerfilePath: ./Dockerfile.backend
    dockerContext: .
    plan: free
    healthCheckPath: /api/health
    envVars:
      # Secret -- set this in the Render dashboard (sync: false means
      # Render won't try to manage/overwrite it).
      - key: FIREWORKS_API_KEY
        sync: false
      # Optional overrides -- omit in the dashboard to use agent/config.py's
      # in-code defaults.
      - key: VISION_MODEL
        sync: false
      - key: TEXT_MODEL
        sync: false
      - key: JUDGE_MODEL
        sync: false
      - key: TOTAL_BUDGET_SECONDS
        sync: false
      - key: MAX_WORKERS
        sync: false
